<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B14 — Píldoras / Stories</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-bg: #07070F;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0D0D18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: var(--color-bg);
      border-radius: 44px;
      border: 2px solid #2a2a3a;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .story-content {
      flex: 1;
      background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.8) 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px 24px 80px;
    }
    .progress-bar-bg {
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      flex: 1;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: white;
      width: 65%; /* Demo progress */
    }
    .xp-badge {
      background: linear-gradient(135deg, #22C55E, #15803d);
      color: white;
      font-weight: 900;
      padding: 8px 16px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(34,197,94,0.4);
      position: absolute;
      top: 80px;
      right: 24px;
      animation: float 2s infinite ease-in-out;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .background-placeholder {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1517836357463-d25dfeac0438?q=80&w=2070&auto=format&fit=crop') center/cover;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="phone">
  <!-- Background Image -->
  <div class="background-placeholder"></div>

  <!-- Progress Indicators at top -->
  <div style="position:absolute; top:54px; left:16px; right:16px; display:flex; gap:6px; z-index:10;">
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:100%;"></div></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:0%;"></div></div>
  </div>

  <!-- Close Button -->
  <a href="B1_dashboard_atleta.html" style="position:absolute; top:74px; left:24px; color:white; font-size:24px; font-weight:300; z-index:10; text-decoration:none;">✕</a>

  <div class="xp-badge">+50 XP</div>

  <div class="story-content">
    <p style="color:#22C55E; font-size:12px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px;">Píldora del Día · Técnica</p>
    <h2 style="color:white; font-size:32px; font-weight:900; line-height:1.1; margin-bottom:16px;">Mueve los pies rápido en el catch</h2>
    <p style="color:#d1d5db; font-size:16px; line-height:1.5; margin-bottom:24px;">La velocidad de desplazamiento lateral es más importante que la altura de la barra. Busca el "stomp" sonoro.</p>
    
    <div style="display:flex; gap:12px;">
      <button style="flex:1; background:white; color:black; font-weight:800; padding:16px; border-radius:14px; border:none; cursor:pointer;">Entendido</button>
      <button style="width:60px; background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); color:white; border-radius:14px; border:1px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center;">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
      </button>
    </div>
  </div>
</div>

<a href="index.html" style="position:fixed; top:20px; left:20px; background:#1e1e30; color:#94a3b8; font-size:13px; padding:8px 14px; border-radius:10px; text-decoration:none; border:1px solid #2a2a3a; z-index:100;">← Volver</a>

</body>
</html>
